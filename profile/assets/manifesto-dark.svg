<svg width="820" height="520" viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#102633"/>
    </linearGradient>
    <linearGradient id="fadeD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39506b" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5b7a99" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e8eef4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="820" height="520" rx="14" fill="url(#bgD)"/>
  <rect x="0.5" y="0.5" width="819" height="519" rx="14" fill="none" stroke="#1d3a52" stroke-width="1"/>
  <!-- blueprint grid -->
  <g stroke="#16324a" stroke-width="1" opacity="0.55">
    <line x1="0" y1="130" x2="820" y2="130"/>
    <line x1="0" y1="190" x2="820" y2="190"/>
    <line x1="0" y1="244" x2="820" y2="244"/>
    <line x1="0" y1="298" x2="820" y2="298"/>
    <line x1="0" y1="352" x2="820" y2="352"/>
    <line x1="0" y1="406" x2="820" y2="406"/>
  </g>
  <!-- eyebrow -->
  <text x="56" y="58" fill="#7fb2d9" font-size="13" letter-spacing="6" font-weight="600">MANIFESTO</text>
  <text x="764" y="58" fill="#3f6383" font-size="13" letter-spacing="2" text-anchor="end">CONA</text>
  <!-- epigraph -->
  <text x="56" y="100" font-size="38" font-weight="700" letter-spacing="0.5">
    <tspan fill="#f5b841">C</tspan><tspan fill="#e8eef4">ommit, </tspan><tspan fill="#f5b841">O</tspan><tspan fill="#e8eef4">r </tspan><tspan fill="#f5b841">N</tspan><tspan fill="#e8eef4">ot at </tspan><tspan fill="#f5b841">A</tspan><tspan fill="#e8eef4">ll.</tspan>
  </text>
  <text x="58" y="124" fill="#8aa4bd" font-size="15" font-style="italic">No trying. Just doing.</text>
  <!-- creeds -->
  <g font-size="16" fill="#cdd9e5">
    <text x="56" y="175">Read the <tspan fill="#f5b841" font-weight="600">context</tspan>, speak my <tspan fill="#f5b841" font-weight="600">own thoughts</tspan> — not the keywords.</text>
    <text x="56" y="229">Between the ideal and the real, find what is <tspan fill="#f5b841" font-weight="600">clear</tspan>.</text>
    <text x="56" y="283">Mark what I <tspan fill="#f5b841" font-weight="600">know</tspan> from what I <tspan fill="#f5b841" font-weight="600">feel</tspan>.</text>
    <text x="56" y="337">Don't just plan it. <tspan fill="#ffffff" font-weight="600">Do it, and do it right.</tspan></text>
    <text x="56" y="391">Use tools to <tspan fill="#f5b841" font-weight="600">grow</tspan>, not to hide behind.</text>
    <text x="56" y="445">Turn <tspan fill="#f5b841" font-weight="600">knowledge</tspan> into <tspan fill="#f5b841" font-weight="600">wisdom</tspan>, and pass it on.</text>
  </g>
  <!-- closing: blur to clear bar -->
  <rect x="56" y="474" width="708" height="2" fill="url(#fadeD)"/>
  <text x="764" y="498" fill="#9fb6cc" font-size="13.5" font-style="italic" text-anchor="end">make it clear, then make it real.</text>
</svg>
